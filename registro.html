<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse — El Norteño Store</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <header class="navbar">
    <a href="index.html" class="nav-logo">
      <img src="imagenes_pagina/El Norteño Store Vintage Sign.png" alt="El Norteño Store" class="nav-logo-img">
    </a>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="login.html">Iniciar Sesión</a>
    </nav>
  </header>

  <main class="form-page">
    <div class="card form-card">
      <h1>Crear Cuenta</h1>
      <p class="form-sub">Únete para comprar en El Norteño Store</p>

      <div id="mensaje" class="alerta" style="display:none"></div>

      <div class="campo">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Tu nombre" maxlength="50">
      </div>

      <div class="campos-2col">
        <div class="campo">
          <label for="apellido-p">Apellido Paterno</label>
          <input type="text" id="apellido-p" placeholder="Paterno" maxlength="30">
        </div>
        <div class="campo">
          <label for="apellido-m">Apellido Materno</label>
          <input type="text" id="apellido-m" placeholder="Materno" maxlength="30">
        </div>
      </div>

      <div class="campo">
        <label for="fecha-nac">Fecha de nacimiento</label>
        <input type="date" id="fecha-nac">
      </div>

      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" autocomplete="email">
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      </div>

      <div class="campo">
        <label for="confirmar">Confirmar Contraseña</label>
        <input type="password" id="confirmar" placeholder="Repite tu contraseña">
      </div>

      <div class="campo-check">
        <input type="checkbox" id="mostrar-pwd">
        <label for="mostrar-pwd">Mostrar contraseñas</label>
      </div>

      <button id="btn-registro" class="btn-primario btn-bloque">Crear Cuenta</button>

      <p class="form-footer">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </p>
    </div>
  </main>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script>
    DB.init();

    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    // Limitar el date picker a ayer como máximo
    const ayer = new Date();
    ayer.setDate(ayer.getDate() - 1);
    document.getElementById('fecha-nac').max = ayer.toISOString().split('T')[0];

    // Mostrar / ocultar contraseñas
    document.getElementById('mostrar-pwd').addEventListener('change', function () {
      const tipo = this.checked ? 'text' : 'password';
      document.getElementById('password').type  = tipo;
      document.getElementById('confirmar').type = tipo;
    });

    document.getElementById('btn-registro').addEventListener('click', () => {
      const nombre      = document.getElementById('nombre').value.trim();
      const apellidoP   = document.getElementById('apellido-p').value.trim();
      const apellidoM   = document.getElementById('apellido-m').value.trim();
      const fechaNac    = document.getElementById('fecha-nac').value;
      const email       = document.getElementById('email').value.trim();
      const password    = document.getElementById('password').value;
      const confirmar   = document.getElementById('confirmar').value;
      const mensajeEl   = document.getElementById('mensaje');

      const mostrar = (texto, tipo = 'error') => {
        mensajeEl.textContent  = texto;
        mensajeEl.className    = `alerta alerta-${tipo}`;
        mensajeEl.style.display = 'block';
      };

      mensajeEl.style.display = 'none';

      // Validaciones
      if (!nombre || !apellidoP || !apellidoM || !fechaNac || !email || !password || !confirmar) {
        mostrar('Por favor completa todos los campos.'); return;
      }

      const hoy = new Date().toISOString().split('T')[0];
      if (fechaNac >= hoy) {
        mostrar('La fecha de nacimiento debe ser anterior a hoy.'); return;
      }

      const soloLetras = /^[A-Za-zÀ-ÿ\s]+$/;
      if (!soloLetras.test(nombre))    { mostrar('El nombre solo puede contener letras.'); return; }
      if (!soloLetras.test(apellidoP)) { mostrar('El apellido paterno solo puede contener letras.'); return; }
      if (!soloLetras.test(apellidoM)) { mostrar('El apellido materno solo puede contener letras.'); return; }

      const formatoEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!formatoEmail.test(email)) { mostrar('El correo no tiene un formato válido.'); return; }

      if (password.length < 6) { mostrar('La contraseña debe tener al menos 6 caracteres.'); return; }
      if (password !== confirmar) { mostrar('Las contraseñas no coinciden.'); return; }

      const nombreCompleto = `${nombre} ${apellidoP} ${apellidoM}`;
      const resultado = Auth.registrar({ nombre: nombreCompleto, email, password, fechaNacimiento: fechaNac });

      if (!resultado.ok) { mostrar(resultado.error); return; }

      mostrar('¡Cuenta creada con éxito! Redirigiendo al login...', 'exito');
      setTimeout(() => window.location.href = 'login.html', 1500);
    });
  </script>
</body>
</html>
