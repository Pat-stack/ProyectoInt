<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías — El Norteño Store</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────── -->
  <header class="navbar">
    <a href="index.html" class="nav-logo">
      <img src="imagenes_pagina/El Norteño Store Vintage Sign.png" alt="El Norteño Store" class="nav-logo-img">
    </a>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="admin.html" data-solo-admin>Administrador</a>
      <a href="login.html" data-solo-invitado>👤 Iniciar Sesión</a>
      <span data-solo-sesion data-nombre-usuario class="nav-bienvenida"></span>
      <a href="#" data-solo-sesion id="btn-logout">Salir</a>
    </nav>
    <button class="btn-carrito-flotante" data-solo-sesion onclick="Carrito.toggle()">
      🛒 <span id="carrito-contador" class="carrito-badge">0</span>
    </button>
  </header>

  <!-- ── Categorías ─────────────────────────────────────── -->
  <main class="pagina-categorias">
    <h1>Categorías</h1>
    <div class="cats-grande" id="cats-grande">
      <!-- Se llena con JS -->
    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom">© 2026 El Norteño Store | Todos los derechos reservados</div>
  </footer>

  <!-- ── Modal carrito ──────────────────────────────────── -->
  <div id="carrito-overlay" onclick="Carrito.cerrar()"></div>
  <div id="carrito-modal">
    <div class="carrito-header">
      <h2>🛒 Tu Carrito</h2>
      <button onclick="Carrito.cerrar()">×</button>
    </div>
    <div id="carrito-contenido" class="carrito-contenido"></div>
    <div class="carrito-footer">
      <div class="carrito-desglose">
        <span>Subtotal:</span><span id="carrito-subtotal">$0.00 MXN</span>
      </div>
      <div class="carrito-desglose">
        <span>IVA (16%):</span><span id="carrito-iva">$0.00 MXN</span>
      </div>
      <div class="carrito-desglose carrito-total-row">
        <span>Total:</span><span id="carrito-total">$0.00 MXN</span>
      </div>
      <button id="carrito-btn-comprar" class="btn-primario btn-bloque" onclick="Carrito.finalizar()">
        Finalizar Compra
      </button>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/carrito.js"></script>
  <script>
    DB.init();
    Auth.aplicarNavbar();
    Carrito.init();

    document.getElementById('btn-logout')?.addEventListener('click', e => {
      e.preventDefault();
      Auth.logout();
      window.location.href = 'index.html';
    });

    const IMAGENES = {
      Perro:    'imagenes_pagina/Perro.jpg',
      Gato:     'imagenes_pagina/gatito.jpg',
      Ave:      'imagenes_pagina/aves.jpg',
      Conejo:   'imagenes_pagina/Conejo.png',
      Hamsters: 'imagenes_pagina/hamster.jpg'
    };

    const cats = DB.getCategorias();
    const grid  = document.getElementById('cats-grande');

    grid.innerHTML = cats.map(c => `
      <a href="catalogo.html?categoria=${encodeURIComponent(c.nombre)}" class="cat-card-grande">
        <img src="${IMAGENES[c.nombre] || ''}" alt="${c.nombre}">
        <h3>${c.nombre}s</h3>
      </a>
    `).join('');
  </script>
</body>
</html>
